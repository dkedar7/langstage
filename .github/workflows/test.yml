name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # [deepagents] pulls langchain, which the default agent + tests need.
          pip install -e ".[deepagents,dev]"

      - name: Run tests
        run: pytest -q

  minimal-install:
    # Guards against UNDECLARED dependencies. The other jobs install
    # `.[deepagents]`, which pulls `langchain` transitively and so masks any
    # dependency that's used-but-not-declared. This job installs with NO extras
    # — exactly what `pip install langstage` gives a real user — and exercises
    # the import + CLI hot paths. It is the test that would have caught the
    # missing `langchain` declaration (found in prod by the daily cloud routine).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install with NO extras (declared deps only)
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Import + CLI smoke on a minimal install
        run: |
          python -c "import langstage; from langstage import CoworkApp, LANGSTAGE_TOOLS; from langstage.middleware import agent_uses_canvas_middleware; print('imports ok')"
          langstage check --demo

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install the app (server + stub-agent deps)
        run: |
          python -m pip install --upgrade pip
          # [deepagents] pulls langchain/langgraph: the server imports langchain
          # eagerly on this branch, and the stub agent needs langgraph. The stub
          # itself calls no model, so no API key is required.
          pip install -e ".[deepagents]"

      - name: Build the frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: langstage-playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  visual:
    runs-on: ubuntu-latest
    # Same pinned image used to generate the baselines locally, so renders match.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v4

      - name: Visual regression (pixel-diff vs committed baselines)
        run: bash frontend/e2e/docker-visual.sh check

      - name: DEBUG — capture what CI actually renders
        if: always()
        run: |
          cd frontend
          npx playwright test screenshots.spec.ts || true
      - name: Upload actual screenshots (TEMP diagnostic)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: langstage-actual-screens
          path: frontend/e2e/screenshots/
          retention-days: 7
