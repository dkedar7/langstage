[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cowork-dash"
version = "0.6.0"
description = "Web UI for deepagents — AI-powered workspace with streaming, file browser, and canvas"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "langgraph-stream-parser>=0.2.2,<0.3",
    # Any real use of cowork-dash already has langgraph in the env (it is the
    # thing being hosted); declaring it makes `run --demo` work on a bare install.
    "langgraph>=1.0",
    "watchfiles>=1.0",
    "click>=8.0",
    "python-dotenv>=1.0",
    "pydantic>=2.0",
    "python-multipart>=0.0.12",
    "croniter>=2.0",
]

[project.optional-dependencies]
deepagents = [
    "deepagents>=0.3",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "ruff>=0.5",
]

[project.scripts]
cowork-dash = "cowork_dash.cli:main"

[tool.hatch.build]
artifacts = ["cowork_dash/static/**"]

[tool.hatch.build.targets.wheel]
packages = ["cowork_dash"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
